name: Monorepo CI/CD Automation

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/ci-cd.yml"

  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "src/**"
      - ".github/workflows/ci-cd.yml"

permissions:
  contents: write

jobs:
  test_matrix:
    name: Backend tests on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ["18.x", "20.x", "22.x"]

    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: src/backend/package-lock.json

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: src/backend/node_modules
          key: backend-node-modules-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('src/backend/package-lock.json') }}
          restore-keys: |
            backend-node-modules-${{ runner.os }}-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Run backend lint
        run: npm run lint --if-present

      - name: Run backend tests
        run: npm test --if-present

      - name: Build backend
        run: npm run build --if-present

  sonarqube_analysis:
    name: SonarQube analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js for analysis
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: |
            src/backend/package-lock.json
            src/frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: src/backend
        run: npm ci

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  
  simulate_deployment:
      name: Simulate secure deployment
      runs-on: ubuntu-latest
      needs:
      - test_matrix
      - sonarqube_analysis

      steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Simulate deployment preparation
        run: |
          echo "Preparing deployment package..."
          echo "Validating deployment environment..."
          echo "Running security checks..."
          echo "No real cloud deployment is performed in this local-only environment."

      - name: Simulate backend deployment
        run: |
          echo "Deploying backend service..."
          echo "Backend deployment simulation completed successfully."

      - name: Simulate frontend deployment
        run: |
          echo "Deploying frontend service..."
          echo "Frontend deployment simulation completed successfully."

      - name: Deployment summary
        run: |
          echo "Deployment simulation passed."
          echo "Commit: $GITHUB_SHA"
          echo "Branch or tag: $GITHUB_REF_NAME"

  create_release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - simulate_deployment

    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}